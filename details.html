<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement System - High Quality Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --blue-dark: #1e3a8a; --blue-light: #3b82f6; --green-main: #10b981; --red-main: #ef4444; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--blue-dark); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 1150px; border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); box-sizing: border-box; margin-top: 10px; }
        .header-section { text-align: center; margin-bottom: 15px; }
        .header-section h2 { color: var(--blue-dark); margin: 5px 0; font-size: 1.5rem; }
        
        /* สไตล์ปุ่มย้อนกลับ */
        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; }
        .btn-back { text-decoration: none; color: var(--blue-light); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-back:hover { color: var(--blue-dark); }

        .balance-box { background: #f8fafc; border: 2px solid var(--blue-dark); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; position: relative; }
        .form-card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 20px; background: #fff; }
        .input-wrapper { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-wrapper input { flex: 1; min-width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-family: 'Kanit'; font-size: 16px; box-sizing: border-box; }
        .btn-submit { background: var(--green-main); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--blue-dark); padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .btn-view { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .btn-edit { color: var(--blue-light); border: none; background: none; font-weight: 600; cursor: pointer; }
        .btn-del { color: var(--red-main); border: none; background: none; font-weight: 600; cursor: pointer; }
        
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #modalContent { width: 90%; overflow-y: auto; max-height: 85vh; display: flex; flex-direction: column; gap: 15px; align-items: center; background: white; padding: 20px; border-radius: 15px; }
        #modalContent img { width: 100%; max-width: 800px; height: auto; border: 1px solid #ddd; margin-bottom: 20px; }

        @media print {
            body { background: white !important; padding: 0; margin: 0; }
            #modal { position: absolute; top: 0; left: 0; background: white; display: block !important; overflow: visible; }
            #modal div:last-child { display: none !important; }
            #modalContent { width: 100%; max-height: none; padding: 0; overflow: visible; box-shadow: none; border-radius: 0; }
            #modalContent img { width: 100%; max-width: none; page-break-after: always; border: none; }
            .container, .header-section, .nav-bar { display: none !important; }
        }

        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 15px; padding: 10px; background: #fff; }
            td { text-align: right; padding: 10px; padding-left: 45%; position: relative; }
            td::before { content: attr(data-label); position: absolute; left: 10px; font-weight: 600; color: #64748b; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-bar">
            <a href="dashboard.html" class="btn-back">🏠 กลับไปหน้าจัดการบริษัท</a>
        </div>

        <div class="header-section">
            <h2 id="compName">กำลังโหลดข้อมูล...</h2>
            <p style="color: #64748b; font-size: 14px;">ระบบจัดการเอกสารความละเอียดสูง (Print Ready)</p>
        </div>

        <div class="balance-box">
            <small style="color: #64748b; display: block; margin-bottom: 5px;">ยอดคงเหลือสุทธิ</small>
            <strong style="font-size: 28px; color: var(--blue-dark);"><span id="totalBalance">0.00</span> ฿</strong>
        </div>

        <div class="form-card">
            <strong id="formStatus" style="display: block; margin-bottom: 12px; color: var(--blue-dark);">+ เพิ่มรายการใหม่</strong>
            <input type="hidden" id="editIdx" value="-1">
            <div class="input-wrapper">
                <input type="datetime-local" id="f_date">
                <input type="text" id="f_detail" placeholder="รายละเอียดรายการ">
                <input type="text" id="f_channel" placeholder="ช่องทาง (เช่น K-Bank, SCB)">
                <input type="number" id="f_amount" placeholder="จำนวนเงิน">
            </div>
            
            <div style="margin: 15px 0; background: #f1f5f9; padding: 10px; border-radius: 10px;">
                <label style="font-size: 14px; color: #1e3a8a; font-weight: 600;">📁 แนบหลักฐานใหม่ :</label>
                <input type="file" id="f_file" accept="image/*" multiple style="margin-top:8px; width: 100%;">
                
                <div id="replaceSection" style="display:none; margin-top: 10px; border-top: 1px dashed #cbd5e1; padding-top: 10px;">
                    <input type="checkbox" id="f_replace_img"> 
                    <label for="f_replace_img" style="color: var(--red-main); font-size: 13px; font-weight: 600;">ล้างรูปเดิมทิ้งและใช้รูปใหม่นี้แทน</label>
                </div>
            </div>

            <button class="btn-submit" onclick="saveData()">บันทึกข้อมูลออนไลน์</button>
            <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; background:#94a3b8; color:white; border:none; padding:12px; margin-top:8px; border-radius:10px; font-family:'Kanit';">ยกเลิกแก้ไข</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>วันที่-เวลา</th>
                        <th>รายการ</th>
                        <th>ช่องทาง</th>
                        <th>จำนวนเงิน</th>
                        <th>ยอดคงเหลือ</th>
                        <th>แนบเอกสาร</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal">
        <div id="modalContent"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px; padding-bottom: 20px;">
            <button onclick="window.print()" style="padding: 12px 25px; background: white; border-radius: 10px; border: 1px solid #ddd; font-weight: 600; cursor: pointer;">🖨️ สั่งพิมพ์เอกสาร (A4)</button>
            <button onclick="closeModal()" style="padding: 12px 25px; background: var(--red-main); color: white; border-radius: 10px; border: none; cursor: pointer;">ปิดหน้าต่าง</button>
        </div>
    </div>

<script>
    let database;
    const selectedComp = sessionStorage.getItem('selectedCompany') || "บริษัททดสอบ";

    function startSync() {
        const firebaseConfig = {
            databaseURL: "https://bank-statement-system-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        database = firebase.database();
        document.getElementById('compName').innerText = selectedComp;

        database.ref('bank_data/' + selectedComp).on('value', (snapshot) => {
            const data = snapshot.val() || [];
            render(data);
        });
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                };
            };
        });
    }

    async function saveData() {
        const idx = document.getElementById('editIdx').value;
        const date = document.getElementById('f_date').value;
        const detail = document.getElementById('f_detail').value;
        const chan = document.getElementById('f_channel').value;
        const amt = parseFloat(document.getElementById('f_amount').value || 0);
        const fileInput = document.getElementById('f_file');
        const isReplace = document.getElementById('f_replace_img').checked;

        if (!date || !detail) { alert("⚠️ กรุณากรอกข้อมูลให้ครบ"); return; }

        try {
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "⏳ กำลังบันทึก...";
            btn.disabled = true;

            const snapshot = await database.ref('bank_data/' + selectedComp).once('value');
            let db = snapshot.val() || [];
            let imgList = (idx !== "-1" && db[idx]) ? (db[idx].img || []) : [];
            
            if (fileInput.files.length > 0) {
                const newImgs = await Promise.all(Array.from(fileInput.files).map(file => compressImage(file)));
                if (isReplace || idx === "-1") { imgList = newImgs; } else { imgList = [...imgList, ...newImgs]; }
            }

            const item = { date, detail, chan, amt, img: imgList };
            if (idx === "-1") { db.push(item); } else { db[idx] = item; }

            await database.ref('bank_data/' + selectedComp).set(db);
            alert("✅ บันทึกสำเร็จ!");
            resetForm();
        } catch (error) {
            alert("❌ บันทึกไม่ได้: " + error.message);
        } finally {
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "บันทึกข้อมูลออนไลน์";
            btn.disabled = false;
        }
    }

    function render(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = ""; 
        let total = 0;
        data.forEach((d, i) => {
            total += d.amt;
            body.innerHTML += `
                <tr>
                    <td data-label="วันที่-เวลา">${d.date.replace('T', ' ')}</td>
                    <td data-label="รายการ">${d.detail}</td>
                    <td data-label="ช่องทาง">${d.chan || '-'}</td>
                    <td data-label="จำนวนเงิน" style="color:${d.amt >= 0 ? 'green':'red'}">${d.amt.toLocaleString()}</td>
                    <td data-label="ยอดคงเหลือ">${total.toLocaleString()}</td>
                    <td data-label="แนบเอกสาร">${(d.img && d.img.length > 0) ? `<button onclick="view(${i})" class="btn-view">📂 พิมพ์รูป (${d.img.length})</button>` : '-'}</td>
                    <td data-label="จัดการ">
                        <button onclick="edit(${i})" class="btn-edit">แก้ไข</button>
                        <button onclick="del(${i})" class="btn-del">ลบ</button>
                    </td>
                </tr>`;
        });
        document.getElementById('totalBalance').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    async function edit(i) {
        const snapshot = await database.ref('bank_data/' + selectedComp).once('value');
        const d = snapshot.val()[i];
        document.getElementById('f_date').value = d.date;
        document.getElementById('f_detail').value = d.detail;
        document.getElementById('f_channel').value = d.chan || "";
        document.getElementById('f_amount').value = d.amt;
        document.getElementById('editIdx').value = i;
        document.getElementById('formStatus').innerText = "📝 แก้ไขรายการ & จัดการรูปภาพ";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('replaceSection').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function del(i) {
        if(confirm("ลบรายการนี้?")) {
            const snapshot = await database.ref('bank_data/' + selectedComp).once('value');
            let db = snapshot.val() || [];
            db.splice(i, 1);
            await database.ref('bank_data/' + selectedComp).set(db);
        }
    }

    function resetForm() {
        document.getElementById('editIdx').value = "-1";
        document.getElementById('formStatus').innerText = "+ เพิ่มรายการใหม่";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('replaceSection').style.display = "none";
        document.getElementById('f_replace_img').checked = false;
        document.getElementById('f_date').value = "";
        document.getElementById('f_detail').value = "";
        document.getElementById('f_channel').value = "";
        document.getElementById('f_amount').value = "";
        document.getElementById('f_file').value = "";
    }

    async function view(index) {
        const snapshot = await database.ref('bank_data/' + selectedComp).once('value');
        const d = snapshot.val()[index];
        const content = document.getElementById('modalContent');
        content.innerHTML = (d.img || []).map(src => `<img src="${src}">`).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = startSync;
</script>
</body>
</html>
